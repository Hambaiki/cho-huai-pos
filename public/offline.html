<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | CHO-HUAI POS</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Sarabun", "IBM Plex Sans Thai", "Segoe UI", sans-serif;
        background:
          radial-gradient(900px 380px at 20% -10%, rgba(15, 118, 110, 0.24), transparent),
          radial-gradient(760px 340px at 95% 12%, rgba(3, 105, 161, 0.2), transparent),
          linear-gradient(180deg, #f6fffd 0%, #f8fafc 100%);
      }

      .card {
        width: min(580px, 100%);
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(148, 163, 184, 0.36);
        border-radius: 20px;
        padding: 28px;
        backdrop-filter: blur(6px);
        box-shadow: 0 18px 46px -26px rgba(15, 23, 42, 0.35);
      }

      h1 {
        margin: 0 0 10px;
        color: #0f172a;
        font-size: clamp(1.5rem, 4vw, 2rem);
      }

      p {
        margin: 0;
        color: #334155;
        line-height: 1.65;
      }

      .meta {
        margin-top: 16px;
        font-size: 0.94rem;
        color: #475569;
      }

      .dot {
        color: #0f766e;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>คุณกำลังออฟไลน์อยู่</h1>
      <p>
        แอปยังเปิดใช้งานได้บางส่วนจากข้อมูลที่แคชไว้แล้ว
        แต่บางหน้าจะต้องเชื่อมต่ออินเทอร์เน็ตก่อน
      </p>
      <p class="meta"><span class="dot">●</span> เมื่อกลับมาออนไลน์ ให้รีเฟรชอีกครั้ง</p>
    </main>
  </body>
</html>
